<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Books</title>
    <link rel="stylesheet" href="manage-books.css">
</head>
<body>
<div class="sidebar">
        <h2>Library Admin</h2>
        <ul>
            <li><a href="Admin-dashboard.html">Dashboard</a></li>
            <li><a href="manage-books.html">Manage Books</a></li>
            <li><a href="add-issue.html">Issue Books</a></li>
            <li><a href="return-books.html">Return Books</a></li>
            <li><a href="report.html">Report</a></li>
            <li><a href="#">Logout</a></li>
        </ul>
    </div>
<div class="container">
    <h1>Book Management</h1>

    <!-- Add Book Form -->
    <div class="form">
        <input type="text" id="title" placeholder="Book Title">
        <input type="text" id="author" placeholder="Author">
        <input type="text" id="category" placeholder="Category">
        <button onclick="addBook()">Add Book</button>
    </div>

    <!-- Book Table -->
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="bookList">
            <!-- Data will come from JS -->
        </tbody>
    </table>
</div>

<script src="manage-books.js"></script>

</body>
</html>
